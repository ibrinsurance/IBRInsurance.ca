<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBR Insurance — Advisor Portal</title>
<meta name="robots" content="noindex, nofollow">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E5E2DC;--border2:#D0CCC4;
  --text:#1A1814;--text2:#6B6760;--text3:#9E9B96;
  --accent:#1B4332;--accent-l:#D8EDDF;
  --red:#C0392B;--red-l:#FDECEA;
  --amber:#B7791F;--amber-l:#FEF3C7;
  --blue:#1E40AF;--blue-l:#DBEAFE;
  --purple:#5B21B6;--purple-l:#EDE9FE;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:DM Sans,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lc{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:380px;text-align:center}
.llogo{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.ltitle{font-size:22px;font-weight:600;margin-bottom:6px}
.lsub{font-size:13px;color:var(--text2);margin-bottom:28px}
.lmode{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:24px}
.lmode-btn{flex:1;padding:7px;font-size:12px;font-family:DM Sans,sans-serif;border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s}
.lmode-btn.active{background:var(--accent);color:#fff}
.signin-wrap{display:flex;justify-content:center;margin-bottom:12px}
.lerror{display:none;background:var(--red-l);color:var(--red);border-radius:var(--rs);padding:10px 14px;font-size:12px;margin-top:12px}
.lpin-wrap{display:none;flex-direction:column;gap:10px}
.lpin-wrap input{padding:10px;border:1px solid var(--border);border-radius:var(--rs);font-size:18px;text-align:center;letter-spacing:6px;font-family:DM Mono,monospace;width:100%}
.lpin-wrap button{padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-family:DM Sans,sans-serif;cursor:pointer}

/* TOPNAV */
#appShell{display:none}
.topnav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:1000;overflow-x:auto;overflow-y:hidden;white-space:nowrap}
.nav-brand{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
.ndiv{width:1px;height:20px;background:var(--border)}
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.mode-btn{padding:5px 10px;font-size:12px;font-family:DM Sans,sans-serif;border:none;background:none;cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .15s;position:relative;z-index:1001}
.mode-btn.active{background:var(--text);color:#fff}
.sw{position:relative;flex:1;max-width:280px}
.sw input{width:100%;padding:6px 9px 6px 28px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);font-family:DM Sans,sans-serif;font-size:12px;color:var(--text);outline:none}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:11px;height:11px;opacity:.35;pointer-events:none}
.nsp{flex:1}
.sync{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.sdot.err{background:var(--red)}
.upill{display:flex;align-items:center;gap:7px;padding:3px 9px 3px 3px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2)}
.uav{width:26px;height:26px;border-radius:50%;background:var(--accent-l);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.obadge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--accent-l);color:var(--accent);font-weight:500}
.btn-lo{padding:4px 9px;font-size:12px;font-family:DM Sans,sans-serif;border:1px solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;color:var(--text2)}
.btn-new{padding:5px 12px;font-size:12px;font-family:DM Sans,sans-serif;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap}

/* MAIN */
.main{padding:16px 20px;max-width:960px;margin:0 auto}
.undo-bar{display:none;background:var(--amber-l);border:1px solid #F6D860;border-radius:var(--rs);padding:7px 12px;margin-bottom:10px;align-items:center;gap:8px;font-size:12px;color:var(--amber)}
.undo-bar button{padding:3px 9px;font-size:11px;font-family:DM Sans,sans-serif;border:1px solid #F6D860;border-radius:4px;background:#fff;color:var(--amber);cursor:pointer}

/* FILTER */
.filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:var(--text3);white-space:nowrap}
select.preset{padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);font-family:DM Sans,sans-serif;font-size:12px;color:var(--text);cursor:pointer;flex:1;min-width:150px;outline:none}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:8px;border-bottom:1px solid var(--border)}
.tab{padding:6px 11px;font-size:12px;font-family:DM Sans,sans-serif;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s;position:relative;z-index:100}
.tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
.bdg{display:inline-flex;align-items:center;justify-content:center;min-width:15px;height:15px;padding:0 3px;border-radius:8px;font-size:10px;font-weight:500}
.br{background:var(--red-l);color:var(--red)}.ba{background:var(--amber-l);color:var(--amber)}.bg{background:var(--accent-l);color:var(--accent)}.bgr{background:var(--bg);color:var(--text3)}
.mar{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.mar button{font-size:11px;padding:3px 9px;border:1px solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif}
.rc{font-size:11px;color:var(--text3)}

/* CARDS */
.list{display:flex;flex-direction:column;gap:5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--border2)}.card.sel{border-color:var(--accent)}.card.done{opacity:.4}
.ct{display:flex;align-items:flex-start;gap:9px}
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.av-gr{background:var(--accent-l);color:var(--accent)}.av-bl{background:var(--blue-l);color:var(--blue)}.av-am{background:var(--amber-l);color:var(--amber)}.av-pu{background:var(--purple-l);color:var(--purple)}.av-rd{background:var(--red-l);color:var(--red)}
.ci{flex:1;min-width:0}
.cn{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ci-ins{font-size:10px;font-weight:400;color:var(--text3)}
.hh-badge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--purple-l);color:var(--purple);border:1px solid #C4B5FD}
.claim-badge{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--red-l);color:var(--red);border:1px solid #FECACA}
.cm2{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.sp{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.sp-ov{background:var(--red-l);color:var(--red)}.sp-tw{background:var(--amber-l);color:var(--amber)}.sp-up{background:var(--accent-l);color:var(--accent)}.sp-no{background:var(--bg);color:var(--text3)}.sp-dn{background:var(--accent-l);color:var(--accent)}
.pt{font-size:10px;padding:2px 5px;border-radius:20px;background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.fd{font-size:10px;color:var(--text3)}
.chk{width:15px;height:15px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:var(--surface);margin-top:2px;transition:all .15s}
.chk.on{background:var(--accent-l);border-color:var(--accent)}

/* DETAIL */
.dp{background:var(--bg);border-radius:var(--rs);padding:12px;margin-top:9px;border:1px solid var(--border)}
.dh{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.da{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.dn{font-size:14px;font-weight:500;color:var(--text)}.ds2{font-size:11px;color:var(--text2);margin-top:2px}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:10px}
.fi label{font-size:10px;color:var(--text3);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.fi span{font-size:12px;color:var(--text);font-family:DM Mono,monospace}
.fi span.n{font-family:DM Sans,sans-serif}
.locked{filter:blur(4px);user-select:none;pointer-events:none}
.sl{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.fu-row{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding:7px 11px;background:var(--surface);border-radius:var(--rs);border:1px solid var(--border)}
.fu-row label{font-size:12px;color:var(--text2);flex:1}
.fu-row input[type=date]{font-size:12px;padding:4px 7px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;outline:none}

/* CLAIMS */
.clm-sec{margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.clm-hdr{padding:7px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);background:var(--bg)}
.clm-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;flex:1}
.clm-open{font-size:11px;padding:3px 8px;border:1px solid var(--red);border-radius:4px;background:none;cursor:pointer;color:var(--red);font-family:DM Sans,sans-serif}
.clm-close{font-size:11px;padding:3px 8px;border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif}
.clm-body{padding:10px 11px}
.clm-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.cf label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.cf select,.cf input{width:100%;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;outline:none}
.cs-pill{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.cs-sub{background:var(--blue-l);color:var(--blue)}.cs-rev{background:var(--amber-l);color:var(--amber)}.cs-app{background:var(--accent-l);color:var(--accent)}.cs-paid{background:var(--accent-l);color:var(--accent)}.cs-den{background:var(--red-l);color:var(--red)}
.clm-nr{display:flex;gap:6px}
.clm-nr input{flex:1;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;outline:none}
.btn-sm{padding:5px 9px;font-size:11px;font-family:DM Sans,sans-serif;border:none;border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap}

/* HOUSEHOLD */
.hhs{margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.hhh{padding:7px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);background:var(--bg)}
.hhht{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;flex:1}
.hha{font-size:11px;padding:3px 7px;border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif}
.hhm{padding:6px 11px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);font-size:12px}
.hhm:last-child{border-bottom:none}
.hhm-n{flex:1;color:var(--text)}.hhm-p{color:var(--text3);font-size:11px}
.hhm-r{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px}
.hhm-r:hover{background:var(--bg)}
.lkp{padding:8px 11px;background:var(--bg);border-top:1px solid var(--border)}
.lkp-l{font-size:11px;color:var(--text3);margin-bottom:5px}
.lkp-list{display:flex;flex-direction:column;gap:3px;max-height:110px;overflow-y:auto}
.lkp-opt{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--text)}
.lkp-opt:hover{background:var(--surface)}

/* NOTES */
.nh{display:flex;flex-direction:column;gap:4px;margin-bottom:7px;max-height:110px;overflow-y:auto}
.ne{background:var(--surface);border-radius:4px;padding:7px 9px;border:1px solid var(--border)}
.nt{font-size:12px;color:var(--text)}.nd{font-size:10px;color:var(--text3);margin-top:2px}
.nir{display:flex;gap:6px}
.nir textarea{flex:1;font-size:12px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);resize:none;height:46px;font-family:DM Sans,sans-serif;outline:none}
.btn-sv{padding:6px 10px;font-size:12px;font-family:DM Sans,sans-serif;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;cursor:pointer;align-self:flex-end;white-space:nowrap}

/* LOOKUP */
.lkg{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.lkgh{padding:9px 13px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.lkghn{font-size:13px;font-weight:500;color:var(--text)}.lkghc{font-size:11px;color:var(--text3)}.lkghct{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap}
.lkp2{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;cursor:pointer}
.lkp2:last-child{border-bottom:none}.lkp2:hover{background:var(--bg)}
.lp1{flex:1;min-width:0}.lp1n{font-size:12px;font-weight:500;color:var(--text)}.lp1m{font-size:11px;color:var(--text3);margin-top:1px}

/* DQ */
.dqi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:6px}
.dqil{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px}
.dqtags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.dqt{padding:2px 7px;border-radius:20px;font-size:11px;background:var(--amber-l);color:var(--amber);border:1px solid #F6D860}
.dqr{font-size:11px;color:var(--text3)}

/* MODAL */
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;z-index:200;overflow-y:auto}
.mod{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:24px;width:100%;max-width:540px}
.mtit{font-size:15px;font-weight:600;color:var(--text);margin-bottom:16px}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.fg2{display:flex;flex-direction:column;gap:4px}.fg2.full{grid-column:1/-1}
.fg2 label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.fg2 input,.fg2 select,.fg2 textarea{font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;outline:none}
.fg2 input:focus,.fg2 select:focus,.fg2 textarea:focus{border-color:var(--accent)}
.fg2 textarea{resize:none;height:52px}
.dup-warn{display:none;background:var(--amber-l);border:1px solid #F6D860;border-radius:var(--rs);padding:7px 11px;font-size:12px;color:var(--amber);margin-bottom:10px}
.fac{display:flex;gap:7px;justify-content:flex-end}
.bcn{padding:7px 14px;font-size:13px;font-family:DM Sans,sans-serif;border:1px solid var(--border);border-radius:var(--rs);background:none;cursor:pointer;color:var(--text2)}
.bsb{padding:7px 16px;font-size:13px;font-family:DM Sans,sans-serif;border:none;border-radius:var(--rs);background:var(--accent);color:#fff;cursor:pointer}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:3rem;color:var(--text3);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.leads-board{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1rem}
.leads-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.leads-col-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg)}
.leads-col-title{font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.06em;flex:1}
.leads-col-count{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.btn-add-lead{font-size:11px;padding:3px 8px;border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif}
.lead-card{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.lead-card:hover{background:var(--bg)}
.lead-card:last-child{border-bottom:none}
.lead-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.lead-meta{font-size:11px;color:var(--text3);margin-bottom:5px}
.lead-note{font-size:11px;color:var(--text2);margin-bottom:6px;padding:5px 8px;background:var(--bg);border-radius:4px;border-left:2px solid var(--border2)}
.lead-actions{display:flex;gap:6px;flex-wrap:wrap}
.lead-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif;transition:all .1s}
.lead-btn:hover{background:var(--bg)}
.lead-btn.wa{border-color:#25D366;color:#25D366}
.lead-btn.wa:hover{background:#f0fdf4}
.lead-btn.convert{border-color:var(--accent);color:var(--accent)}
.lead-btn.lost{border-color:var(--red);color:var(--red)}
.lead-due{font-size:10px;padding:2px 6px;border-radius:20px;margin-left:auto}
.lead-due.overdue{background:var(--red-l);color:var(--red)}
.lead-due.today{background:var(--amber-l);color:var(--amber)}
.lead-due.upcoming{background:var(--accent-l);color:var(--accent)}
.lead-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:var(--text);margin-bottom:2px}
.stat-label{font-size:11px;color:var(--text3)}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.an-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.an-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.an-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.an-bar-label{font-size:11px;color:var(--text2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.an-bar-wrap{flex:1;background:var(--bg);border-radius:20px;height:6px;overflow:hidden}
.an-bar-fill{height:100%;border-radius:20px;background:var(--accent);transition:width .5s}
.an-bar-val{font-size:11px;color:var(--text3);width:60px;text-align:right;flex-shrink:0}
.an-yrrow{display:flex;gap:8px;margin-bottom:8px;align-items:baseline}
.an-yr{font-size:12px;color:var(--text3);width:36px;flex-shrink:0}
.an-yrtotal{font-size:13px;font-weight:500;color:var(--text);flex:1}
.an-yrchange{font-size:11px;padding:1px 6px;border-radius:20px}
.an-pos{background:var(--accent-l);color:var(--accent)}
.an-neg{background:var(--red-l);color:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lc">
    <div class="llogo">Insurance by Rattan</div>
    <div class="ltitle">Advisor Portal</div>
    <div class="lsub">Sign in with your authorized Google account</div>
    <div class="signin-wrap">
      <div id="g_id_onload"
        data-client_id="49708486624-1ct34k1ur759otklcd2cnlgbaa2vggd1.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
        data-type="standard"
        data-shape="rectangular"
        data-theme="outline"
        data-text="sign_in_with"
        data-size="large"
        data-width="300">
      </div>
    </div>
    <div class="lerror" id="loginError">Access denied. Only authorized accounts can access this portal.</div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <nav class="topnav">
    <span class="nav-brand">IBR Portal</span>
    <div class="ndiv"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeFollowup" onclick="setMode('followup')">Follow-ups</button>
      <button class="mode-btn" id="modeLookup" onclick="setMode('lookup')">Client lookup</button>
      <button class="mode-btn" id="modeClaims" onclick="setMode('claims')">Claims</button>
      <button class="mode-btn" id="modeLeads" onclick="setMode('leads')">Leads</button>
      <button class="mode-btn" id="modeAnalytics" onclick="setMode('analytics')">Analytics</button>
      <button class="mode-btn" id="modeDq" onclick="setMode('dq')">Data quality</button>
    </div>
    <div class="sw">
      <svg class="si" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Search name, phone, email, city…" oninput="onSearch()">
    </div>
    <div class="nsp"></div>
    <div class="sync"><div class="sdot" id="sdot"></div><span id="syncStatus">Connecting…</span></div>
    <div class="upill"><div class="uav" id="uav">R</div><span id="uname">Rattan</span><span class="obadge" id="roleLabel">Owner</span></div>
    <button class="btn-lo" onclick="logout()">Sign out</button>
    <button class="btn-new" onclick="openModal()">+ New sale</button>
  </nav>
  <div class="main">
    <div class="undo-bar" id="undoBar"></div>
    <div id="fctrl">
      <div class="filter-row">
        <span class="fl">Show:</span>
        <select class="preset" id="preset" onchange="applyPreset()">
          <option value="all">All products</option>
          <option value="followups">Follow-ups only</option>
          <option value="all">All products</option>
          <option value="life">Life insurance (Term, UL, WL)</option>
          <option value="ci">Critical illness</option>
          <option value="disability">Disability</option>
          <option value="investments">Investments (RRSP / RESP / TFSA / FHSA)</option>
          <option value="group">Group / H&D / Team</option>
          <option value="travel">Travel / Visitor only</option>
        </select>
      </div>
      <div class="tabs">
        <button class="tab" id="t-ov" onclick="setTab('overdue')">Overdue <span class="bdg br" id="b-ov">0</span></button>
        <button class="tab" id="t-tw" onclick="setTab('thisweek')">This week <span class="bdg ba" id="b-tw">0</span></button>
        <button class="tab" id="t-up" onclick="setTab('upcoming')">Upcoming <span class="bdg bg" id="b-up">0</span></button>
        <button class="tab active" id="t-al" onclick="setTab('all')">All <span class="bdg bgr" id="b-al">0</span></button>
      </div>
      <div class="mar"><span class="rc" id="rc"></span><button onclick="markAllDone()">Mark all visible as complete</button></div>
    </div>
    <div id="list"></div>
  </div>
</div>
<div id="modal"></div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
// ══ CONFIG ══
const OWNER = 'rattan.taggar@gmail.com';
const ASSISTANTS = ['insurancebyrattan@gmail.com'];
// ↓ Replace this with your Apps Script Web App URL after deployment
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPOnlI9pDHcg3l-UQ5NJKuIIyJRZkPRUNj1v0j0EfAX0sq91UnP5GNzkcA9LA0N-Rn/exec';

const TRAVEL=new Set(['vtc','supervisa','travel insurance','travel','truck-travel','truck - travel','truck travel','international student','student insurance','emergency medical']);
const LIFE=new Set(['term insurance','ul insurance','whole life','term transfer','ul transfer','wl transfer','transfer']);
function cls(p){const n=(p||'').toLowerCase().trim();if(TRAVEL.has(n))return'travel';if(LIFE.has(n))return'life';if(n==='critical illness')return'ci';if(['disability','disability insurance'].includes(n))return'dis';if(['rrsp','resp','tfsa','fhsa','hisa'].includes(n))return'inv';if(['group insurance','team','team insurance','h&d'].includes(n))return'grp';return'other';}
const PRODUCTS=['Term Insurance','Critical Illness','UL Insurance','Whole Life','Disability Insurance','RRSP','RESP','TFSA','FHSA','HISA','Group Insurance','H&D','Team','VTC','Supervisa','Travel Insurance','Truck-Travel','International Student','Student Insurance','Emergency Medical'];
const CLAIM_TYPES=['Death Benefit','Critical Illness Payout','Disability Claim','Travel/Medical','Trip Cancellation','Other'];
const CLAIM_STATUSES=['Submitted','In Review','Approved','Paid','Denied'];
const DQG=[{l:'Disability variants',i:['Disability','Disability Insurance']},{l:'Truck-Travel variants',i:['Truck-Travel','Truck - Travel','Truck Travel']},{l:'RRSP typos',i:['RRSP','RRP','SRRP']},{l:'Transfer variants',i:['UL Transfer','WL Transfer','Term Transfer','Transfer']},{l:'Likely wrong column',i:['Tiktok','Entity']}];

let isOwner=false, clients=[], nextId=1000, mode='followup', tab='all', sel=null, preset='all', nnt={}, lkp=null, undoStack=[], sheetConnected=false;

// ── AUTH ──
window.addEventListener('load', function(){
  // Re-initialize Google Sign-in after page load to ensure it fires correctly
  if(window.google && google.accounts){
    google.accounts.id.initialize({
      client_id: '49708486624-1ct34k1ur759otklcd2cnlgbaa2vggd1.apps.googleusercontent.com',
      callback: handleCredentialResponse,
      auto_prompt: false
    });
    google.accounts.id.renderButton(
      document.querySelector('.g_id_signin'),
      {type:'standard',shape:'rectangular',theme:'outline',text:'sign_in_with',size:'large',width:300}
    );
  }
});

function handleCredentialResponse(resp){
  const p=parseJwt(resp.credential);
  const email=p.email;
  if(![OWNER,...ASSISTANTS].includes(email)){document.getElementById('loginError').style.display='block';return;}
  isOwner=(email===OWNER);
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
  const i=(p.name||email).split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('');
  document.getElementById('uav').textContent=i;
  document.getElementById('uname').textContent=(p.name||email).split(' ')[0];
  document.getElementById('roleLabel').textContent=isOwner?'Owner':'Assistant';
  loadData();
}
function parseJwt(t){return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}
function logout(){google.accounts.id.disableAutoSelect();document.getElementById('appShell').style.display='none';document.getElementById('loginScreen').style.display='flex';clients=[];sel=null;}

// ── LOAD FROM APPS SCRIPT ──
async function loadData(){
  document.getElementById('syncStatus').textContent='Loading…';
  document.getElementById('list').innerHTML='<div class="loading"><div class="spinner"></div><span>Connecting to your sheet…</span></div>';
  try{
    const r=await fetch(APPS_SCRIPT_URL+'?action=getData');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    parseRows(d.rows);
    sheetConnected=true;
    document.getElementById('sdot').classList.remove('err');
    document.getElementById('syncStatus').textContent=clients.length+' clients · live';
    loadLeads();
    render();
  }catch(e){
    console.error('Load error:',e);
    document.getElementById('sdot').classList.add('err');
    document.getElementById('syncStatus').textContent='Cannot reach sheet';
    document.getElementById('list').innerHTML='<div class="empty">Cannot connect to Google Sheet. Error: '+e.message+'</div>';
  }
}


async function sheetWrite(action, data){
  if(!sheetConnected)return;
  try{
    const params=new URLSearchParams({action});
    Object.entries(data).forEach(([k,v])=>params.set(k,typeof v==='object'?JSON.stringify(v):v));
    // Use no-cors for writes — we don't need the response
    fetch(APPS_SCRIPT_URL+'?'+params.toString(),{mode:'no-cors',redirect:'follow'});
  }catch(e){console.warn('Write error:',e);}
}

function parseRows(rows){
  clients=[];
  rows.forEach((r,i)=>{
    let parsedNotes=[];
    if(r.crmNotes){try{parsedNotes=JSON.parse(r.crmNotes);}catch{parsedNotes=[{t:r.crmNotes,d:''}];}}
    if(r.n1)parsedNotes.push({t:r.n1,d:'From sheet',sheet:true});
    if(r.n2)parsedNotes.push({t:r.n2,d:'From sheet',sheet:true});
    let claim=null;
    if(r.claimStatus){try{claim=JSON.parse(r.claimStatus);}catch{}}
    let hh=[];
    if(r.householdLinks){try{hh=JSON.parse(r.householdLinks);}catch{}}
    clients.push({id:nextId++,rowNum:r.rowNum,cn:r.cn,ins:r.ins||r.cn,ds:r.ds,co:r.co,cv:r.cv,pn:r.pn,ph:r.ph,em:r.em,cy:r.cy,ap:r.ap,cm:r.cm,src:r.src,pr:r.pr,fu:r.fu||null,done:false,notes:parsedNotes,hh,claim});
  });
}


// ── UNDO ──
function snap(){return JSON.parse(JSON.stringify(clients));}
function pushUndo(lbl){undoStack.push({lbl,s:snap()});if(undoStack.length>20)undoStack.shift();const b=document.getElementById('undoBar');b.innerHTML=`<span style="flex:1">Last action: <strong>${lbl}</strong></span><button onclick="doUndo()">Undo</button><button onclick="this.parentElement.style.display='none'" style="margin-left:4px;background:none;border:none;cursor:pointer;color:var(--amber);font-size:16px">×</button>`;b.style.display='flex';}
function doUndo(){if(!undoStack.length)return;const u=undoStack.pop();clients=u.s;sel=null;document.getElementById('undoBar').style.display='none';render();}

// ── HELPERS ──
const tod=new Date();tod.setHours(0,0,0,0);
function fmtD(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});}catch{return d;}}
function ini(n){return(n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0].toUpperCase()).join('');}
const AVC=['av-gr','av-bl','av-am','av-pu','av-rd'];
function avc(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))&0xffff;return AVC[h%AVC.length];}
function nc(s){return(s||'').split(/[,|]/).map(x=>x.trim().toLowerCase()).filter(Boolean);}
function gst(c){if(c.done)return'done';if(!c.fu)return'none';const fd=new Date(c.fu);fd.setHours(0,0,0,0);const d=Math.ceil((fd-tod)/864e5);if(d<0)return'overdue';if(d<=7)return'thisweek';return'upcoming';}
function vbp(c){const cl=cls(c.pr);if(preset==='followups')return cl!=='travel';if(preset==='all')return true;if(preset==='life')return cl==='life';if(preset==='ci')return cl==='ci';if(preset==='disability')return cl==='dis';if(preset==='investments')return cl==='inv';if(preset==='group')return cl==='grp';if(preset==='travel')return cl==='travel';return true;}
function getAllLinked(c){const ap=nc(c.ph),ae=nc(c.em),mh=new Set(c.hh||[]);return clients.filter(o=>{if(o.id===c.id)return false;return mh.has(o.id)||nc(o.ph).some(p=>ap.includes(p))||nc(o.em).some(e=>ae.includes(e));});}
function getFiltered(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  return clients.filter(c=>{
    if(!vbp(c))return false;
    // Search across all key fields including phone and email
    const mq=!q||[c.cn,c.ins,c.cy,c.pn,c.ph,c.em,c.co,c.pr,c.src].some(x=>(x||'').toLowerCase().includes(q));
    if(!mq)return false;
    // If actively searching, show all tabs; otherwise respect tab filter
    if(q)return true;
    const s=gst(c);
    if(tab==='overdue')return s==='overdue';
    if(tab==='thisweek')return s==='thisweek';
    if(tab==='upcoming')return s==='upcoming';
    return true;
  });
}

// ── SEARCH ──
function onSearch(){
  const q=(document.getElementById('searchInput').value||'').trim();
  if(q){
    // Auto-switch to All tab and all products when searching
    if(tab!=='all'){
      tab='all';
      [['ov','overdue'],['tw','thisweek'],['up','upcoming'],['al','all']].forEach(([k,v])=>
        document.getElementById('t-'+k).classList.toggle('active',v==='all')
      );
    }
    if(preset!=='all'){
      preset='all';
      document.getElementById('preset').value='all';
    }
  }
  render();
}

// ── CONTROLS ──
function applyPreset(){preset=document.getElementById('preset').value;sel=null;render();}
function setMode(m){
  mode=m;sel=null;lkp=null;
  ['followup','lookup','claims','leads','analytics','dq'].forEach(function(x){
    var el=document.getElementById('mode'+x.charAt(0).toUpperCase()+x.slice(1));
    if(el)el.classList.toggle('active',x===m);
  });
  document.getElementById('fctrl').style.display=m==='followup'?'':'none';
  document.getElementById('searchInput').placeholder=m==='lookup'?'Type phone, email, or name…':'Search name, phone, email, city…';
  render();
}
function setTab(t){tab=t;sel=null;[['ov','overdue'],['tw','thisweek'],['up','upcoming'],['al','all']].forEach(([k,v])=>document.getElementById('t-'+k).classList.toggle('active',v===t));render();}
function markAllDone(){pushUndo('Mark all complete');getFiltered().forEach(c=>c.done=true);render();}
function ubdg(){const base=clients.filter(vbp);const q=(document.getElementById('searchInput').value||'').toLowerCase();const qf=q?base.filter(c=>[c.cn,c.cy,c.pn].some(x=>(x||'').toLowerCase().includes(q))):base;[['ov','overdue'],['tw','thisweek'],['up','upcoming']].forEach(([k,v])=>document.getElementById('b-'+k).textContent=qf.filter(c=>gst(c)===v).length);document.getElementById('b-al').textContent=qf.length;}

// ── RENDER ──
function render(){
  if(mode==='followup')renderFU();
  else if(mode==='lookup')renderLookup();
  else if(mode==='claims')renderClaims();
  else if(mode==='leads')renderLeads();
  else if(mode==='analytics')renderAnalytics();
  else renderDQ();
}
function renderFU(){ubdg();const f=getFiltered();document.getElementById('rc').textContent=f.length+' client'+(f.length===1?'':'s');document.getElementById('list').innerHTML=f.length?f.map(cardH).join(''):'<div class="empty">No clients in this view</div>';}
const SP={overdue:['sp-ov','Overdue'],thisweek:['sp-tw','Due this week'],upcoming:['sp-up','Upcoming'],none:['sp-no','No follow-up'],done:['sp-dn','Complete']};
const csMap={Submitted:'cs-sub','In Review':'cs-rev',Approved:'cs-app',Paid:'cs-paid',Denied:'cs-den'};

function cardH(c){const s=gst(c);const[sc,sl]=SP[s];const lnk=getAllLinked(c);const isel=sel===c.id;
return`<div class="card${isel?' sel':''}${c.done?' done':''}" onclick="selC(${c.id})">
<div class="ct">
<div class="chk${c.done?' on':''}" onclick="event.stopPropagation();togDone(${c.id})">${c.done?`<svg viewBox="0 0 10 10" fill="none" width="9" height="9"><path d="M2 5l2.5 2.5L8 3" stroke="#1B4332" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div>
<div class="av ${avc(c.cn)}">${ini(c.cn)}</div>
<div class="ci"><div class="cn">${c.cn}${c.cn!==c.ins?`<span class="ci-ins">insured: ${c.ins}</span>`:''}${lnk.length?`<span class="hh-badge">household ${lnk.length}</span>`:''}${c.claim?`<span class="claim-badge">claim active</span>`:''}</div>
<div class="cm2"><span>${c.cy}</span><span>${nc(c.ph)[0]||''}</span><span>${c.co}</span></div></div>
<div class="cr"><span class="sp ${sc}">${sl}</span>${c.fu?`<span class="fd">${fmtD(c.fu)}</span>`:''}<span class="pt">${c.pr}</span></div></div>
${isel?detH(c):''}
</div>`;}

function detH(c){
  var lnk=getAllLinked(c);
  var linkable=clients.filter(function(o){return o.id!==c.id&&!lnk.find(function(l){return l.id===o.id;});});
  var commVal=isOwner?c.cm:'<span class="locked">&#9679;&#9679;&#9679;&#9679;</span>';
  var apVal=isOwner?c.ap:'<span class="locked">&#9679;&#9679;&#9679;&#9679;</span>';
  var html='<div class="dp" onclick="event.stopPropagation()">';
  html+='<div class="dh"><div class="da '+avc(c.cn)+'">'+ini(c.cn)+'</div>';
  html+='<div style="flex:1"><div class="dn">'+c.cn+'</div><div class="ds2">Insured: '+c.ins+' \xb7 '+c.pr+'</div></div>';
  html+='<button onclick="event.stopPropagation();openEditModal('+c.id+')" style="font-size:11px;padding:4px 10px;border:1px solid var(--border2);border-radius:4px;background:none;cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif;margin-left:auto;flex-shrink:0">Edit policy</button></div>';
  html+='<div class="fg">';
  html+='<div class="fi"><label>Company</label><span class="n">'+c.co+'</span></div>';
  html+='<div class="fi"><label>Policy #</label><span>'+c.pn+'</span></div>';
  html+='<div class="fi"><label>Coverage</label><span class="n">'+c.cv+'</span></div>';
  html+='<div class="fi"><label>Date sold</label><span class="n">'+fmtD(c.ds)+'</span></div>';
  html+='<div class="fi"><label>Phone</label><span class="n">'+c.ph+'</span></div>';
  html+='<div class="fi"><label>Email</label><span class="n">'+c.em+'</span></div>';
  html+='<div class="fi"><label>Amount paid</label><span>'+apVal+'</span></div>';
  html+='<div class="fi"><label>Commission</label><span>'+commVal+'</span></div>';
  html+='<div class="fi"><label>Source</label><span class="n">'+c.src+'</span></div>';
  html+='<div class="fi"><label>City</label><span class="n">'+c.cy+'</span></div>';
  html+='</div>';
  html+='<div class="fu-row"><label>Next follow-up date</label>';
  html+='<input type="date" value="'+(c.fu||'')+'" onchange="updFU('+c.id+',this.value)"></div>';
  html+=claimH(c);
  // Household
  html+='<div class="hhs">';
  html+='<div class="hhh"><span class="hhht">Household / linked files ('+lnk.length+')</span>';
  html+='<button class="hha" onclick="event.stopPropagation();togglePicker('+c.id+')">+ Link file</button></div>';
  if(lnk.length===0){
    html+='<div style="padding:8px 12px;font-size:12px;color:var(--text3)">No linked files \u2014 phone/email matches auto-link</div>';
  } else {
    lnk.forEach(function(l){
      var isManual=(c.hh||[]).includes(l.id);
      html+='<div style="border-bottom:1px solid var(--border)">';
      html+='<div style="padding:9px 12px;background:var(--surface)">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
      html+='<div class="av '+avc(l.cn)+'" style="width:26px;height:26px;font-size:10px;flex-shrink:0">'+ini(l.cn)+'</div>';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">'+l.cn+(l.ins&&l.ins!==l.cn?' <span style="font-size:11px;font-weight:400;color:var(--text3)">/ '+l.ins+'</span>':'')+'</div>';
      html+='<div style="font-size:11px;color:var(--text3)">'+l.pr+' \xb7 '+l.co+'</div></div>';
      html+='<div style="display:flex;align-items:center;gap:6px">';
      if(isManual){
        html+='<span style="font-size:11px;color:var(--text3);cursor:pointer;padding:2px 6px;border:1px solid var(--border);border-radius:4px" onclick="event.stopPropagation();unlnk('+c.id+','+l.id+')">remove</span>';
      } else {
        html+='<span style="font-size:10px;color:var(--text3);padding:2px 5px;background:var(--bg);border-radius:4px">auto</span>';
      }
      html+='</div></div>';
      html+='<div style="display:flex;gap:16px;padding:0 12px 8px 46px;font-size:11px;flex-wrap:wrap">';
      html+='<span style="color:var(--text3)">Policy: <strong style="color:var(--text)">'+(l.pn||'\u2014')+'</strong></span>';
      html+='<span style="color:var(--text3)">Sold: <strong style="color:var(--text)">'+fmtD(l.ds)+'</strong></span>';
      html+='<span style="color:var(--text3)">Coverage: <strong style="color:var(--text)">'+(l.cv||'\u2014')+'</strong></span>';
      if(l.fu)html+='<span style="color:var(--text3)">Follow-up: <strong style="color:var(--amber)">'+fmtD(l.fu)+'</strong></span>';
      html+='</div>';
      html+='<div style="padding:0 12px 9px 46px">';
      html+='<button style="font-size:11px;padding:3px 10px;border:1px solid var(--border2);border-radius:4px;background:var(--surface);cursor:pointer;color:var(--text2);font-family:DM Sans,sans-serif" ';
      html+='onclick="event.stopPropagation();jumpTo('+l.id+')">Open full file →</button>';
      html+='</div></div>';
    });
  }
  html+='<div id="picker-'+c.id+'" style="display:none;padding:10px 12px;background:var(--bg);border-top:1px solid var(--border)">';
  html+='<div style="font-size:11px;color:var(--text3);margin-bottom:6px">Search to link a file ('+linkable.length+' available):</div>';

function togglePicker(cid){

// LEADS MODULE
// ════════════════════════════════════════════════════
var leads = [];
var leadNextId = 5000;
var LEADS_TAB = 'CRM_Leads';
var LEADS_LISTS = ['Life & CI Leads', 'VTC & SV'];
var leadEditId = null;

// Load leads from sheet
async function loadLeads(){
  if(!sheetConnected) return;
  try{
    var r = await fetch(APPS_SCRIPT_URL+'?action=getLeads');
    var d = await r.json();
    if(d.leads) leads = d.leads;
  }catch(e){ console.warn('Leads load error:',e); }
}

// Save lead to sheet
async function saveLead(lead){
  if(!sheetConnected) return;
  try{
    var params = new URLSearchParams({action:'saveLead',leadJson:JSON.stringify(lead)});
    await fetch(APPS_SCRIPT_URL+'?'+params.toString());
  }catch(e){ console.warn('Lead save error:',e); }
}

function addLead(list){
  var name = prompt('Client name / note:');
  if(!name) return;
  var phone = prompt('Phone number (optional):');
  var note = prompt('Notes (optional):');
  var due = prompt('Due date YYYY-MM-DD (optional):');
  var lead = {
    id: leadNextId++,
    list: list,
    name: name,
    phone: (phone||'').trim(),
    note: (note||'').trim(),
    due: (due||'').trim(),
    created: new Date().toISOString().split('T')[0],
    status: 'active' // active | converted | lost
  };
  pushUndo('Add lead: '+name);
  leads.unshift(lead);
  saveLead(lead);
  render();
}

function convertLead(id){
  var l = leads.find(function(x){return x.id===id;});
  if(!l) return;
  pushUndo('Convert lead: '+l.name);
  l.status = 'converted';
  l.convertedDate = new Date().toISOString().split('T')[0];
  saveLead(l);
  // Pre-fill new sale modal
  openModal();
  setTimeout(function(){
    var cn = document.getElementById('f-cn');
    var ph = document.getElementById('f-ph');
    var nt = document.getElementById('f-nt');
    if(cn) cn.value = l.name;
    if(ph) ph.value = l.phone;
    if(nt) nt.value = l.note;
    if(ph && l.phone) chkDup();
  }, 100);
  render();
}

function lostLead(id){
  var l = leads.find(function(x){return x.id===id;});
  if(!l) return;
  if(!confirm('Mark "'+l.name+'" as lost/closed without converting?')) return;
  pushUndo('Lost lead: '+l.name);
  l.status = 'lost';
  l.lostDate = new Date().toISOString().split('T')[0];
  saveLead(l);
  render();
}

function whatsappLead(phone, name){
  if(!phone){ alert('No phone number for this lead'); return; }
  var clean = phone.replace(/\D/g,'');
  if(clean.length===10) clean = '1'+clean;
  var msg = encodeURIComponent('Hi '+name+', this is Rattan from IBR Insurance. I wanted to follow up with you regarding your insurance needs. Do you have a few minutes to connect?');
  window.open('https://wa.me/'+clean+'?text='+msg,'_blank');
}

function getDueStatus(due){
  if(!due) return null;
  var tod = new Date(); tod.setHours(0,0,0,0);
  var fd = new Date(due); fd.setHours(0,0,0,0);
  var diff = Math.ceil((fd-tod)/864e5);
  if(diff<0) return 'overdue';
  if(diff===0) return 'today';
  return 'upcoming';
}

function renderLeads(){
  var el = document.getElementById('list');
  var activeLeads = leads.filter(function(l){return l.status==='active';});
  var convertedLeads = leads.filter(function(l){return l.status==='converted';});
  var lostLeads = leads.filter(function(l){return l.status==='lost';});
  var total = leads.length;
  var convRate = total>0?Math.round(convertedLeads.length/total*100):0;
  var lostRate = total>0?Math.round(lostLeads.length/total*100):0;

  // Stats row
  var html = '<div class="lead-stats">';
  html += '<div class="stat-card"><div class="stat-num">'+activeLeads.length+'</div><div class="stat-label">Active leads</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:var(--accent)">'+convertedLeads.length+'</div><div class="stat-label">Converted</div></div>';
  html += '<div class="stat-card"><div class="stat-num" style="color:var(--red)">'+lostLeads.length+'</div><div class="stat-label">Lost / closed</div></div>';
  html += '<div class="stat-card"><div class="stat-num">'+convRate+'%</div><div class="stat-label">Conversion rate<br><span style="font-size:10px;color:var(--red)">'+lostRate+'% lost</span></div></div>';
  html += '</div>';

  // Conversion by list
  html += '<div style="display:flex;gap:12px;margin-bottom:14px;">';
  LEADS_LISTS.forEach(function(listName){
    var listLeads = leads.filter(function(l){return l.list===listName;});
    var listConv = listLeads.filter(function(l){return l.status==='converted';}).length;
    var listLost = listLeads.filter(function(l){return l.status==='lost';}).length;
    var listTotal = listLeads.length;
    var rate = listTotal>0?Math.round(listConv/listTotal*100):0;
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;flex:1">';
    html += '<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">'+listName+'</div>';
    html += '<div style="font-size:12px;color:var(--text2)">'+listTotal+' total &middot; <span style="color:var(--accent)">'+listConv+' converted ('+rate+'%)</span> &middot; <span style="color:var(--red)">'+listLost+' lost</span></div>';
    html += '</div>';
  });
  html += '</div>';

  // Two-column board - active leads only
  html += '<div class="leads-board">';
  LEADS_LISTS.forEach(function(listName){
    var listActive = activeLeads.filter(function(l){return l.list===listName;});
    html += '<div class="leads-col">';
    html += '<div class="leads-col-header">';
    html += '<span class="leads-col-title">'+listName+'</span>';
    html += '<span class="leads-col-count">'+listActive.length+'</span>';
    html += '<button class="btn-add-lead" onclick="addLead(\''+listName+'\')">+ Add</button>';
    html += '</div>';
    if(listActive.length===0){
      html += '<div style="padding:16px;font-size:12px;color:var(--text3);text-align:center">No active leads</div>';
    } else {
      listActive.forEach(function(l){
        var ds = getDueStatus(l.due);
        html += '<div class="lead-card">';
        html += '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:3px">';
        html += '<div class="lead-name" style="flex:1">'+l.name+'</div>';
        if(ds) html += '<span class="lead-due '+ds+'">'+(ds==='overdue'?'Overdue':ds==='today'?'Today':fmtD(l.due))+'</span>';
        html += '</div>';
        if(l.phone) html += '<div class="lead-meta">'+l.phone+'</div>';
        if(l.note) html += '<div class="lead-note">'+l.note+'</div>';
        html += '<div class="lead-meta" style="margin-bottom:5px">Added '+fmtD(l.created)+'</div>';
        html += '<div class="lead-actions">';
        if(l.phone) html += '<button class="lead-btn wa" onclick="whatsappLead(\''+l.phone+'\',\''+l.name+'\')">WhatsApp</button>';
        html += '<button class="lead-btn convert" onclick="convertLead('+l.id+')">Convert \u2192 Sale</button>';
        html += '<button class="lead-btn lost" onclick="lostLead('+l.id+')">Lost</button>';
        html += '</div></div>';
      });
    }
    html += '</div>';
  });
  html += '</div>';

  // Recent converted/lost at bottom
  var recent = leads.filter(function(l){return l.status!=='active';}).slice(0,10);
  if(recent.length){
    html += '<div style="margin-top:4px"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Recent closed leads</div>';
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">';
    recent.forEach(function(l){
      var statusColor = l.status==='converted'?'var(--accent)':'var(--red)';
      var statusLabel = l.status==='converted'?'Converted':'Lost';
      html += '<div style="padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">';
      html += '<div style="flex:1"><div style="font-size:12px;color:var(--text)">'+l.name+'</div>';
      html += '<div style="font-size:11px;color:var(--text3)">'+l.list+(l.phone?' \xb7 '+l.phone:'')+'</div></div>';
      html += '<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:'+statusColor+'22;color:'+statusColor+'">'+statusLabel+'</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  el.innerHTML = html;
}

// ════════════════════════════════════════════════════
// ANALYTICS MODULE
// ════════════════════════════════════════════════════
function renderAnalytics(){
  var el=document.getElementById('list');
  if(!sheetConnected||clients.length===0){
    el.innerHTML='<div class="empty">Sign in and wait for data to load first</div>';
    return;
  }
  var tod=new Date();
  var curYear=tod.getFullYear();
  var curMonth=tod.getMonth()+1;
  var dayOfYear=Math.ceil((tod-new Date(curYear,0,1))/864e5);
  var daysInYear=365+(curYear%4===0?1:0);
  var yearProgress=dayOfYear/daysInYear;
  var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var fmt$=function(n){return '$'+n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');};
  var byYearMonth={};
  var byYear={};
  var byProduct={};
  var bySource={};
  clients.forEach(function(c){
    if(!c.ds)return;
    var d=new Date(c.ds);
    var y=d.getFullYear();
    var m=d.getMonth()+1;
    if(!y||isNaN(y)||y<2019||y>curYear)return;
    if(!byYearMonth[y])byYearMonth[y]={};
    if(!byYearMonth[y][m])byYearMonth[y][m]={commission:0,count:0};
    if(!byYear[y])byYear[y]={commission:0,count:0};
    var comm=parseFloat((c.cm||'').replace(/[^0-9.-]/g,''))||0;
    byYearMonth[y][m].commission+=comm;
    byYearMonth[y][m].count++;
    byYear[y].commission+=comm;
    byYear[y].count++;
    var pr=(c.pr||'').trim();
    if(pr){if(!byProduct[pr])byProduct[pr]={count:0,commission:0};byProduct[pr].count++;byProduct[pr].commission+=comm;}
    var src=(c.src||'Unknown').trim();
    if(!bySource[src])bySource[src]={count:0,commission:0};bySource[src].count++;bySource[src].commission+=comm;
  });
  var years=Object.keys(byYearMonth).map(Number).sort(function(a,b){return a-b;});
  var displayYears=years.slice(-5);
  var curYearComm=byYear[curYear]?byYear[curYear].commission:0;
  var projected=yearProgress>0?curYearComm/yearProgress:0;
  var prevYear=curYear-1;
  var prevYearComm=byYear[prevYear]?byYear[prevYear].commission:0;
  var vsLastYear=prevYearComm>0?((projected-prevYearComm)/prevYearComm*100):0;
  var topProducts=Object.entries(byProduct).sort(function(a,b){return b[1].commission-a[1].commission;}).slice(0,10);
  var topSources=Object.entries(bySource).sort(function(a,b){return b[1].count-a[1].count;}).slice(0,8);
  var maxProd=topProducts.length?topProducts[0][1].commission:1;
  var maxSrc=topSources.length?topSources[0][1].count:1;
  var yearColors=['#6366f1','#10b981','#f59e0b','#ef4444','#3b82f6'];
  var html='';
  // Stats
  html+='<div class="lead-stats" style="margin-bottom:14px">';
  html+='<div class="stat-card"><div class="stat-num">'+fmt$(curYearComm)+'</div><div class="stat-label">'+curYear+' to date</div></div>';
  html+='<div class="stat-card"><div class="stat-num" style="color:var(--accent)">'+fmt$(projected)+'</div><div class="stat-label">Full year projected</div></div>';
  var vsColor=vsLastYear>=0?'var(--accent)':'var(--red)';
  html+='<div class="stat-card"><div class="stat-num" style="color:'+vsColor+'">'+(vsLastYear>=0?'+':'')+vsLastYear.toFixed(1)+'%</div><div class="stat-label">vs '+prevYear+' ('+fmt$(prevYearComm)+')</div></div>';
  html+='<div class="stat-card"><div class="stat-num">'+(byYear[curYear]?byYear[curYear].count:0)+'</div><div class="stat-label">Policies '+curYear+'</div></div>';
  html+='</div>';
  // Year table
  html+='<div class="an-card" style="margin-bottom:14px"><div class="an-title">Year-over-year</div>';
  Object.keys(byYear).map(Number).sort(function(a,b){return b-a;}).forEach(function(y,i,arr){
    var curr=byYear[y].commission;
    var prev=byYear[arr[i+1]]?byYear[arr[i+1]].commission:null;
    var change=prev?Math.round((curr-prev)/prev*100):null;
    var isCur=y===curYear;
    html+='<div class="an-yrrow">';
    html+='<span class="an-yr" style="'+(isCur?'font-weight:600':'')+'">'+y+'</span>';
    html+='<span class="an-yrtotal" style="'+(isCur?'color:var(--accent)':'')+'">'+fmt$(curr)+(isCur?' <span style="font-size:10px;color:var(--text3)">proj: '+fmt$(projected)+'</span>':'')+'</span>';
    html+='<span style="font-size:11px;color:var(--text3);margin-right:8px">'+byYear[y].count+' policies</span>';
    if(change!==null)html+='<span class="an-yrchange '+(change>=0?'an-pos':'an-neg')+'">'+(change>=0?'+':'')+change+'%</span>';
    html+='</div>';
  });
  html+='</div>';
  // Monthly multi-year comparison
  html+='<div class="an-card" style="margin-bottom:14px"><div class="an-title">Monthly side-by-side (last '+displayYears.length+' years)</div>';
  html+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">';
  displayYears.forEach(function(y,i){
    html+='<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)">';
    html+='<div style="width:10px;height:10px;border-radius:2px;background:'+yearColors[i%yearColors.length]+'"></div>'+y+'</div>';
  });
  html+='</div>';
  var maxM=0;
  displayYears.forEach(function(y){for(var m=1;m<=12;m++){var v=byYearMonth[y]&&byYearMonth[y][m]?byYearMonth[y][m].commission:0;if(v>maxM)maxM=v;}});
  if(maxM===0)maxM=1;
  for(var m=1;m<=12;m++){
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">';
    html+='<span style="font-size:11px;color:var(--text2);width:28px;flex-shrink:0">'+MONTHS[m-1]+'</span>';
    html+='<div style="flex:1">';
    displayYears.forEach(function(y,i){
      var val=byYearMonth[y]&&byYearMonth[y][m]?byYearMonth[y][m].commission:0;
      var pct=Math.round(val/maxM*100);
      var isCurMonthYear=(y===curYear&&m===curMonth);
      html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">';
      html+='<div style="flex:1;background:var(--bg);border-radius:2px;height:6px;overflow:hidden">';
      html+='<div style="width:'+pct+'%;height:100%;background:'+yearColors[i%yearColors.length]+';border-radius:2px;'+(isCurMonthYear?'box-shadow:0 0 0 1px '+yearColors[i%yearColors.length]:'')+'"></div></div>';
      html+='<span style="font-size:10px;color:var(--text3);width:54px;text-align:right;flex-shrink:0">'+fmt$(val)+'</span>';
      html+='</div>';
    });
    html+='</div></div>';
  }
  html+='</div>';
  html+='<div class="an-grid">';
  // Products
  html+='<div class="an-card"><div class="an-title">Top products by commission</div>';
  topProducts.forEach(function(e){
    var pct=Math.round(e[1].commission/maxProd*100);
    html+='<div class="an-bar-row"><span class="an-bar-label" title="'+e[0]+'">'+e[0]+'</span><div class="an-bar-wrap"><div class="an-bar-fill" style="width:'+pct+'%;background:var(--blue)"></div></div><span class="an-bar-val">'+fmt$(e[1].commission)+'</span></div>';
  });
  html+='</div>';
  // Sources
  html+='<div class="an-card"><div class="an-title">Top referral sources</div>';
  topSources.forEach(function(e){
    var pct=Math.round(e[1].count/maxSrc*100);
    html+='<div class="an-bar-row"><span class="an-bar-label" title="'+e[0]+'">'+e[0]+'</span><div class="an-bar-wrap"><div class="an-bar-fill" style="width:'+pct+'%;background:var(--purple)"></div></div><span class="an-bar-val">'+e[1].count+'</span></div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

  var c=clients.find(function(x){return x.id===id;});
  if(!c)return;
  document.getElementById('modal').innerHTML='<div class="mbg" onclick="if(event.target===this)document.getElementById(\'modal\').innerHTML=\'\'">'
  +'<div class="mod"><div class="mtit">Edit policy \u2014 '+c.cn+'</div>'
  +'<div class="fgr">'
  +'<div class="fg2"><label>Client name</label><input id="e-cn" value="'+c.cn+'"></div>'
  +'<div class="fg2"><label>Insured name</label><input id="e-ins" value="'+c.ins+'"></div>'
  +'<div class="fg2"><label>Date sold</label><input id="e-ds" type="date" value="'+c.ds+'"></div>'
  +'<div class="fg2"><label>Company</label><input id="e-co" value="'+c.co+'"></div>'
  +'<div class="fg2"><label>Product sold</label><select id="e-pr">'+PRODUCTS.map(function(p){return'<option'+(p===c.pr?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div>'
  +'<div class="fg2"><label>Policy number</label><input id="e-pn" value="'+c.pn+'"></div>'
  +'<div class="fg2"><label>Coverage amount</label><input id="e-cv" value="'+c.cv+'"></div>'
  +'<div class="fg2"><label>Amount paid</label><input id="e-ap" value="'+c.ap+'"></div>'
  +(isOwner?'<div class="fg2"><label>Commission</label><input id="e-cm" value="'+c.cm+'"></div>':'<div class="fg2"><label>Commission</label><input disabled placeholder="Owner only"></div>')
  +'<div class="fg2"><label>Source</label><input id="e-src" value="'+c.src+'"></div>'
  +'<div class="fg2"><label>Phone</label><input id="e-ph" value="'+c.ph+'"></div>'
  +'<div class="fg2"><label>Email</label><input id="e-em" value="'+c.em+'"></div>'
  +'<div class="fg2"><label>City</label><input id="e-cy" value="'+c.cy+'"></div>'
  +'<div class="fg2"><label>Next follow-up</label><input id="e-fu" type="date" value="'+(c.fu||'')+'"></div>'
  +'</div>'
  +'<div class="fac">'
  +'<button class="bcn" onclick="document.getElementById(\'modal\').innerHTML=\'\'">Cancel</button>'
  +'<button class="bsb" onclick="submitEdit('+id+')">Save changes</button>'
  +'</div></div></div>';
}

async function submitEdit(id){
  var c=clients.find(function(x){return x.id===id;});
  if(!c)return;
  pushUndo('Edit: '+c.cn);
  var g=function(eid){var el=document.getElementById(eid);return el&&!el.disabled?(el.value||'').trim():'';};
  c.cn=g('e-cn')||c.cn;
  c.ins=g('e-ins')||c.ins;
  c.ds=g('e-ds')||c.ds;
  c.co=g('e-co')||c.co;
  c.pr=g('e-pr')||c.pr;
  c.pn=g('e-pn')||c.pn;
  c.cv=g('e-cv')||c.cv;
  c.ap=g('e-ap')||c.ap;
  if(isOwner)c.cm=g('e-cm')||c.cm;
  c.src=g('e-src')||c.src;
  c.ph=g('e-ph')||c.ph;
  c.em=g('e-em')||c.em;
  c.cy=g('e-cy')||c.cy;
  c.fu=g('e-fu')||null;
  // Write changed fields back to sheet
  var C={clientName:3,insuredName:4,dateSold:5,company:6,coverage:7,policyNumber:8,phone:14,email:15,city:16,amountPaid:17,commission:18,source:20,product:21,followupDate:22};
  var updates=[
    [C.clientName,c.cn],[C.insuredName,c.ins],[C.dateSold,c.ds],[C.company,c.co],
    [C.coverage,c.cv],[C.policyNumber,c.pn],[C.phone,c.ph],[C.email,c.em],
    [C.city,c.cy],[C.amountPaid,c.ap],[C.source,c.src],[C.product,c.pr],[C.followupDate,c.fu||'']
  ];
  if(isOwner)updates.push([C.commission,c.cm]);
  for(var i=0;i<updates.length;i++){
    sheetWrite('writeFollowupDate',{rowNum:c.rowNum,value:updates[i][1],colOverride:updates[i][0]});
  }
  document.getElementById('modal').innerHTML='';
  render();
  alert('Changes saved \u2713');
}
